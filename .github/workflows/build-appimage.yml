name: Build AppImage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Run native rebuild (skip ffmpeg-static download)
        run: npm rebuild

      - name: Fix native binary permissions
        run: |
          chmod +x resources/key/linux/x64/xkey_helper_linux
          chmod +x resources/welive/linux/x64/welive

      - name: Build Frontend & Type Check
        run: |
          npx tsc
          npx vite build

      - name: Package AppImage
        run: |
          npx electron-builder --linux appimage --publish never

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v5
        with:
          name: WeFlow-AppImage
          path: release/WeFlow-*.AppImage
          retention-days: 7

      - name: Upload AppImage to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME}
          gh release upload "$TAG" release/WeFlow-*.AppImage --clobber || true
